<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pugify - MP3 Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --spotify-green: #1DB954;
            --dark-bg: #0f0f0f;
            --light-text: #ffffff;
        }

        * {
            transition: opacity 0.3s ease;
        }

        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1a2e 100%);
            color: var(--light-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container-main {
            width: 100%;
            padding: 20px;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--spotify-green);
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(29, 185, 84, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--spotify-green);
        }

        .header p {
            font-size: 1rem;
            color: #b3b3b3;
            margin: 0;
        }

        .input-group-custom {
            margin-bottom: 20px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: var(--light-text);
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--spotify-green);
            color: var(--light-text);
            box-shadow: 0 0 0 0.2rem rgba(29, 185, 84, 0.25);
            outline: none;
        }

        .form-control:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-control::placeholder {
            color: #888888;
        }

        .btn-download {
            width: 100%;
            background: var(--spotify-green);
            border: none;
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download:hover:not(:disabled) {
            background: #1ed760;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.4);
            color: #000;
        }

        .btn-download:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-download:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Loading indicator and spinner improvements */
        .loading-indicator {
            display: none;
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: rgba(29, 185, 84, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(29, 185, 84, 0.3);
        }

        .loading-indicator.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spinner-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(29, 185, 84, 0.2);
            border-top-color: var(--spotify-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #b3b3b3;
            font-size: 0.95rem;
            margin: 0;
            font-weight: 500;
        }

        .progress-bar-custom {
            width: 100%;
            height: 4px;
            background: rgba(29, 185, 84, 0.2);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--spotify-green), #1ed760);
            border-radius: 2px;
            animation: progressPulse 1.5s ease-in-out infinite;
        }

        @keyframes progressPulse {
            0% { width: 10%; }
            50% { width: 85%; }
            100% { width: 10%; }
        }

        .alert-custom {
            margin-top: 20px;
            border-radius: 8px;
            border: none;
            padding: 15px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.2);
            border-left: 4px solid #dc3545;
            color: #ff6b6b;
        }

        .alert-success {
            background: rgba(29, 185, 84, 0.2);
            border-left: 4px solid var(--spotify-green);
            color: #1ed760;
        }

        .status-badge {
            display: inline-block;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            margin-left: 8px;
            background: rgba(29, 185, 84, 0.2);
            color: #1ed760;
        }

        .info-text {
            font-size: 0.85rem;
            color: #888888;
            margin-top: 20px;
            text-align: center;
            line-height: 1.5;
        }

        .info-text a {
            color: var(--spotify-green);
            text-decoration: none;
        }

        .info-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .card-container {
                padding: 25px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header p {
                font-size: 0.9rem;
            }

            .spinner {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="card-container">
            <div class="header">
                <h1>🎵 Pugify</h1>
                <p>Download Spotify tracks as MP3<br><small style="font-size: 0.8rem; color: #888;">for backing tracks & music practice</small></p>
                <small style="font-size: 0.7rem; color: #666; margin-top: 10px;" id="versionInfo">Carregando...</small>
            </div>

            <form id="downloadForm">
                <div class="input-group-custom">
                    <input
                        type="text"
                        class="form-control"
                        id="spotifyUrl"
                        placeholder="Cole aqui a URL da música (ex: https://open.spotify.com/track/...)"
                        required
                        autocomplete="off"
                    >
                </div>

                <button type="submit" class="btn-download" id="downloadBtn">
                    <span id="btnIcon">⬇️</span>
                    <span id="btnText">Baixar MP3</span>
                </button>
            </form>

            <div class="loading-indicator" id="loadingIndicator">
                <div class="spinner-container">
                    <div class="spinner"></div>
                </div>
                <p class="loading-text" id="statusText">Processando sua música...</p>
                <div class="progress-bar-custom">
                    <div class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="alert-custom alert-error" id="errorAlert"></div>
            <div class="alert-custom alert-success" id="successAlert"></div>

            <div class="info-text">
                <strong>ℹ️ Instruções:</strong><br>
                1. Abra a música no Spotify<br>
                2. Clique em "Compartilhar" → "Copiar link da faixa"<br>
                3. Cole o link acima e clique em "Baixar MP3"
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('downloadForm');
        const urlInput = document.getElementById('spotifyUrl');
        const downloadBtn = document.getElementById('downloadBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const statusText = document.getElementById('statusText');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');

        let isDownloading = false;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (isDownloading) return; // Prevent double submission

            const url = urlInput.value.trim();

            // Validate URL format - accepts both regular and locale URLs
            // Examples: https://open.spotify.com/track/... or https://open.spotify.com/intl-pt/track/...
            const spotifyTrackRegex = /^https:\/\/open\.spotify\.com(?:\/intl-[a-z]{2})?\/track\/[a-zA-Z0-9]+/;
            if (!spotifyTrackRegex.test(url)) {
                showError('❌ URL inválida. Certifique-se de que é um link direto do Spotify.');
                return;
            }

            // Clear previous alerts
            clearAlerts();

            // Show loading state
            isDownloading = true;
            downloadBtn.disabled = true;
            urlInput.disabled = true;
            loadingIndicator.classList.add('active');
            btnIcon.textContent = '⏳';
            btnText.textContent = 'Baixando...';
            updateStatus('Iniciando download...');

            try {
                updateStatus('Conectando ao servidor...');

                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });

                if (!response.ok) {
                    updateStatus('Processando erro...');
                    const errorData = await response.json().catch(() => ({error: 'Erro desconhecido'}));
                    const errorMessage = errorData.error || `Erro ${response.status}`;
                    throw new Error(errorMessage);
                }

                updateStatus('Download recebido! Salvando arquivo...');

                // Get filename from Content-Disposition header if available
                const contentDisposition = response.headers.get('content-disposition');
                let filename = 'musica.mp3';
                if (contentDisposition) {
                    const filenameMatch = contentDisposition.match(/filename="?([^"]+)"?/);
                    if (filenameMatch) {
                        filename = filenameMatch[1];
                    }
                }

                // Create blob and download
                const blob = await response.blob();
                
                if (blob.size === 0) {
                    throw new Error('Arquivo vazio recebido do servidor');
                }

                const downloadUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                link.parentNode.removeChild(link);
                
                // Cleanup
                setTimeout(() => {
                    window.URL.revokeObjectURL(downloadUrl);
                }, 100);

                // Show success message
                updateStatus('Download concluído!');
                showSuccess(`✅ Download iniciado com sucesso! Arquivo: ${filename}`);
                urlInput.value = '';

                // Reset UI after delay
                setTimeout(() => {
                    resetUI();
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                const errorMsg = error.message || 'Ocorreu um erro ao processar sua requisição. Tente novamente.';
                showError(`❌ ${errorMsg}`);
                updateStatus('Erro no download');
                resetUI();
            }
        });

        function updateStatus(message) {
            statusText.textContent = message;
        }

        function showError(message) {
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
            successAlert.style.display = 'none';
        }

        function showSuccess(message) {
            successAlert.textContent = message;
            successAlert.style.display = 'block';
            errorAlert.style.display = 'none';
        }

        function clearAlerts() {
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
        }

        function resetUI() {
            isDownloading = false;
            loadingIndicator.classList.remove('active');
            downloadBtn.disabled = false;
            urlInput.disabled = false;
            btnIcon.textContent = '⬇️';
            btnText.textContent = 'Baixar MP3';
            urlInput.focus();
        }

        // Clear error when user starts typing
        urlInput.addEventListener('input', () => {
            if (errorAlert.style.display === 'block') {
                clearAlerts();
            }
        });

        // Focus on input on load
        window.addEventListener('load', () => {
            urlInput.focus();
        });

        // Prevent closing page while downloading
        window.addEventListener('beforeunload', (e) => {
            if (isDownloading) {
                e.preventDefault();
                e.returnValue = 'Download em progresso. Tem certeza que deseja sair?';
                return e.returnValue;
            }
        });

        // Load and display server info for debugging
        async function loadServerInfo() {
            try {
                const response = await fetch('/info');
                const data = await response.json();
                const versionElement = document.getElementById('versionInfo');
                versionElement.textContent = `🔧 Servidor: ${data.timestamp}`;
                console.log('🎵 Pugify Server Info:', data);
            } catch (error) {
                console.error('Erro ao carregar info do servidor:', error);
                document.getElementById('versionInfo').textContent = 'Servidor indisponível';
            }
        }

        // Load server info on page load
        window.addEventListener('load', loadServerInfo);
    </script>
</body>
</html>
